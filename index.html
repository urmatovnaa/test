<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой супер-сайт | KIBERone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.gif" type="image/gif">
</head>
<body>
    <h2>Напиши мне сообщение 📩</h2>

    <form name="contact" method="POST" data-netlify="true" action="/">
        
        <label for="name">Твое имя:</label>
        <input type="text" id="name" name="name" placeholder="Иван" required>

        <label for="email">Твой Email:</label>
        <input type="email" id="email" name="email" placeholder="example@mail.ru" required>
        <label for="message">Сообщение:</label>
        <textarea id="message" name="message" rows="5" placeholder="Привет! Твой сайт супер!"></textarea>

        <button type="submit">Отправить роботу 🤖</button>
    </form>

</body>
</html>
